<!DOCTYPE html>
<html lang="zxx">
<head>
    <meta charset="UTF-8">
    <title>Fix my Trip</title>
    
    <link rel="alternate" hreflang="de" href="https://www.fix-my-trip.com/de/index.html" />
    <link rel="alternate" hreflang="es" href="https://www.fix-my-trip.com/es/index.html" />
    <link rel="alternate" hreflang="fr" href="https://www.fix-my-trip.com/fr/index.html" />
    <link rel="alternate" hreflang="it" href="https://www.fix-my-trip.com/it/index.html" />
    <link rel="alternate" hreflang="nl" href="https://www.fix-my-trip.com/nl/index.html" />
    <link rel="alternate" hreflang="pt" href="https://www.fix-my-trip.com/pt/index.html" />
    <link rel="alternate" hreflang="nl-be" href="https://www.fix-my-trip.com/nl-be/index.html" />
    <link rel="alternate" hreflang="fr-be" href="https://www.fix-my-trip.com/fr-be/index.html" />
    <link rel="alternate" hreflang="x-default" href="https://www.fix-my-trip.com/de/index.html" /> 

    <meta http-equiv="refresh" content="0; url=/de/index.html">
    
    <script>
        (function() {
            var userLang = (navigator.language || navigator.userLanguage).toLowerCase();
            
            // SCHRITT 1: Zuerst auf spezifische Regionen prüfen (5-stellig)
            if (userLang.startsWith("nl-be")) {
                window.location.replace("/nl-be/index.html");
                return;
            } else if (userLang.startsWith("fr-be")) {
                window.location.replace("/fr-be/index.html");
                return;
            }
            
            // SCHRITT 2: Wenn es keine belgische Region ist, nach den ersten 2 Zeichen filtern
            var lang = userLang.substring(0, 2);
            
            if (lang === "es") {
                window.location.replace("/es/index.html");
            } else if (lang === "fr") {
                window.location.replace("/fr/index.html");
            } else if (lang === "it") {
                window.location.replace("/it/index.html");
            } else if (lang === "nl") {
                window.location.replace("/nl/index.html");
            } else if (lang === "pt") {
                window.location.replace("/pt/index.html");
            } else {
                window.location.replace("/de/index.html");
            }
        })();
    </script>
</head>
<body>
    <p>Redirecting... / Bitte wählen Sie Ihre Sprache / Kies uw taal / Choisissez votre langue:</p>

        <li><a href="/fr-be/index.html">Français (Belgique)</a></li>
    </ul>
</body>
</html>
